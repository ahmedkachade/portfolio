<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Portfolio</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .iframe-container {
      position: relative;
      width: 100%;
      max-width: 1200px; /* Optional max width */
      aspect-ratio: 16 / 9; /* Keeps correct slide proportion */
    }
    iframe {
      position: absolute;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div class="iframe-container">
    <iframe 
      src="https://docs.google.com/presentation/d/e/2PACX-1vSBST_fP4sZ5KmbjlSNH5Q2es3qMLXikDTVK3ZJ2lWlRGO1YKp9Q-SCIQ_hYcC7989A3E2EajyLmmbp/pubembed?start=false&loop=false"
      allowfullscreen="true"
      mozallowfullscreen="true"
      webkitallowfullscreen="true">
    </iframe>
  </div>
</body>
</html>
